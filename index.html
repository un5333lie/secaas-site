<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeelieSec SecaaS — Managed Security Platform</title>

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SeelieSec",
      "url": "https://secaas.seeliesecurity.ai",
      "parentOrganization": {
        "@type": "Organization",
        "name": "Seelie Security",
        "url": "https://seeliesecurity.ai"
      },
      "description": "Enterprise-grade managed security operations powered by open-source tools and AI.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "url": "https://secaas.seeliesecurity.ai/contact"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Managed Security Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "SIEM & Log Management",
              "description": "Wazuh-powered security information and event management with 24/7 monitoring."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Endpoint Protection",
              "description": "EDR, antivirus, and fleet management across all endpoints."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Threat Intelligence",
              "description": "Automated threat feed ingestion, IOC correlation, and proactive threat hunting."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "SeelieSec Advisor",
              "description": "AI-powered virtual CISO providing 24/7 security guidance and compliance monitoring."
            }
          }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
